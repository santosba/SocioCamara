{% extends "_base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2>Logout</h2>
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {{form | crispy}}
        <button type="submit" class="btn btn-primary">Logout</button>
    </form>
{% endblock %}
