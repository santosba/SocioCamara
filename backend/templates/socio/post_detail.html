{% extends "base.html" %}
{% block content %}
<div class="container mt-4 mb-5">
    <div class="row">
        <div class="col-md-4">
            {% if artigo.image %}
                <img src="{{ artigo.image.url }}" class="img-fluid rounded" alt="{{ artigo.titulo }}">
            {% else %}
                <img src="https://via.placeholder.com/300x200?text=Sem+Imagem" class="img-fluid rounded" alt="Sem imagem">
            {% endif %}
        </div>
        <div class="col-md-8">
            <h1>{{ artigo.titulo }}</h1>
            <p class="text-muted">Por {{ artigo.autor }} em {{ artigo.data_publicacao|date:"F j, Y" }}</p>
            <p>{{ artigo.conteudo }}</p>
        </div>
    </div>
</div>


{% endblock %}
